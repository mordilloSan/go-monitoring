name: go-monitoring

services:
  go-monitoring:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: go-monitoring:local
    container_name: go-monitoring
    restart: unless-stopped
    network_mode: host
    pid: host
    environment:
      PORT: "45876"
      HTTP_LOG: "${HTTP_LOG:-true}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      HISTORY: "${HISTORY:-cpu,mem,diskio,network,containers}"
    security_opt:
      - apparmor=unconfined
      - systempaths=unconfined
    volumes:
      - go-monitoring-data:/var/lib/go-monitoring
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/run/dbus/system_bus_socket:/var/run/dbus/system_bus_socket:ro

volumes:
  go-monitoring-data:
