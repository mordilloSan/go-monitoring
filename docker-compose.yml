services:
  go-monitoring:
    build:
      context: .
    image: go-monitoring:local
    container_name: go-monitoring
    restart: unless-stopped
    network_mode: host
    environment:
      LISTEN: ":45876"
      DATA_DIR: /var/lib/go-monitoring
      HTTP_LOG: "${HTTP_LOG:-true}"
      SKIP_GPU: "true"
    volumes:
      - go-monitoring-data:/var/lib/go-monitoring
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/run/dbus/system_bus_socket:/var/run/dbus/system_bus_socket:ro

volumes:
  go-monitoring-data:
