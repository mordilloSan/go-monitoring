name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to release, for example v1.0.0
        required: true
        type: string

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

jobs:
  validate:
    name: Validate release tag
    runs-on: ubuntu-latest

    steps:
      - name: Validate tag format
        run: |
          set -euo pipefail
          if ! [[ "${RELEASE_TAG}" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z][0-9A-Za-z.-]*)?(\+[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "Release tag must be semver with a leading v, for example v1.2.3 or v1.2.3-rc.1" >&2
            exit 1
          fi

  check:
    name: Backend checks
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Cache Go tools
        uses: actions/cache@v4
        with:
          path: ~/.go/bin
          key: go-tools-${{ runner.os }}-${{ hashFiles('Makefile', 'go.mod') }}

      - name: Run backend checks
        run: make check-backend

  build:
    name: Build linux amd64 v2
    runs-on: ubuntu-latest
    needs: check

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          CGO_ENABLED: '0'
          GIT_VERSION: ${{ env.RELEASE_TAG }}
        run: |
          set -euo pipefail
          make ensure-go
          make build \
            OS=linux \
            ARCH=amd64 \
            GOAMD64=v2 \
            NVML=true

      - name: Package release artifacts
        run: |
          set -euo pipefail
          package="go-monitoring_linux_amd64_v2_${RELEASE_TAG}"
          mkdir -p "dist/${package}"
          cp go-monitoring "dist/${package}/go-monitoring"
          cp LICENSE NOTICE README.md "dist/${package}/"
          tar -czf "dist/${package}.tar.gz" -C dist "${package}"
          ./scripts/build-deb.sh ./go-monitoring dist "${RELEASE_TAG}"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: go-monitoring_linux_amd64_v2
          path: |
            dist/*.tar.gz
            dist/*.deb
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum *.tar.gz *.deb > checksums.txt

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" dist/* --clobber --repo "${GITHUB_REPOSITORY}"
          else
            gh release create "${RELEASE_TAG}" dist/* \
              --title "${RELEASE_TAG}" \
              --generate-notes \
              --verify-tag \
              --repo "${GITHUB_REPOSITORY}"
          fi

  apt-repo:
    name: Publish APT repository
    runs-on: ubuntu-latest
    needs: publish

    steps:
      - name: Check for signing key
        id: key
        env:
          APT_GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
        run: |
          if [ -z "$APT_GPG_PRIVATE_KEY" ]; then
            echo "APT_GPG_PRIVATE_KEY secret not set; skipping APT repo publish." >> "$GITHUB_STEP_SUMMARY"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.key.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Download release artifacts
        if: steps.key.outputs.skip != 'true'
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Import signing key
        if: steps.key.outputs.skip != 'true'
        env:
          APT_GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
        run: printf '%s\n' "$APT_GPG_PRIVATE_KEY" | gpg --batch --import

      - name: Build and push APT repository
        if: steps.key.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          GPG_PASSPHRASE: ${{ secrets.APT_GPG_PASSPHRASE }}
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq apt-utils

          remote="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          if git clone --depth 1 --branch gh-pages "$remote" site 2>/dev/null; then
            echo "Updating existing gh-pages branch"
          else
            mkdir site
            git -C site init -b gh-pages
            git -C site remote add origin "$remote"
          fi

          mkdir -p site/apt/pool/main
          cp dist/*.deb site/apt/pool/main/
          cp packaging/install.sh site/install.sh
          ./scripts/build-apt-repo.sh site/apt

          cd site
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "APT repository unchanged; nothing to push."
          else
            git commit -m "apt: publish ${RELEASE_TAG}"
            git push origin gh-pages
          fi
