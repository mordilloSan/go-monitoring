name: Backend Checks

on:
  push:
    branches: [main, 'dev/v*', 'release/**']
    tags: ['v*']
  pull_request:
    branches: [main, 'dev/v*', 'release/**']

jobs:
  check-backend:
    name: make check-backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run backend checks
        run: make check-backend
