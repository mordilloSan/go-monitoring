name: Backend Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-backend:
    name: make check-backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run backend checks
        run: make check-backend
